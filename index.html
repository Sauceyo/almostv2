<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>ALMOST — Prototype v2.1</title>
  <style>
    html, body { margin:0; padding:0; background:#0b0b10; height:100%; overflow:hidden; }
    canvas { display:block; width:100vw; height:100vh; touch-action:manipulation; }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<script>
(() => {
  const canvas = document.getElementById('c');

  // Safer: try alpha:false, then fall back to default if a device doesn’t like it
  let ctx = canvas.getContext('2d', { alpha: false });
  if (!ctx) ctx = canvas.getContext('2d');
  if (!ctx) {
    document.body.innerHTML = '<div style="color:#fff;font:16px system-ui;padding:16px">Canvas not supported on this browser.</div>';
    return;
  }

  // --- HiDPI canvas ---
  function resize() {
    const dpr = Math.max(1, Math.min(3, window.devicePixelRatio || 1));
    canvas.width = Math.floor(window.innerWidth * dpr);
    canvas.height = Math.floor(window.innerHeight * dpr);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener('resize', resize);
  resize();

  const clamp = (v,a,b)=>Math.max(a,Math.min(b,v));

  const state = {
    running: true,
    score: 0,
    best: 0,
    lastMissPx: null,

    speed: 280,
    speedRamp: 10,

    spawnEvery: 0.95,
    spawnMin: 0.58,

    // Slot (safe window) size
    slotH: 160,
    slotMin: 95,
    slotShrink: 2.2,

    // proximity tiers (distance from player edge to nearest slot edge)
    closePx: 14,
    almostPx: 6,

    flash: 0,
    shake: 0,
