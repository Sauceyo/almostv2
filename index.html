<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>ALMOST: DRIFT — Prototype v0.4</title>
  <style>
    html, body { margin:0; padding:0; background:#0b0b10; height:100%; overflow:hidden; }
    canvas { display:block; width:100vw; height:100vh; touch-action:manipulation; }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<script>
(() => {
  const canvas = document.getElementById('c');
  let ctx = canvas.getContext('2d', { alpha:false }) || canvas.getContext('2d');
  if (!ctx) { document.body.innerHTML = '<div style="color:#fff;padding:16px;font:16px system-ui">Canvas unsupported.</div>'; return; }

  const clamp = (v,a,b)=>Math.max(a,Math.min(b,v));
  const lerp = (a,b,t)=>a+(b-a)*t;

  function resize() {
    const dpr = Math.max(1, Math.min(3, window.devicePixelRatio || 1));
    canvas.width = Math.floor(window.innerWidth * dpr);
    canvas.height = Math.floor(window.innerHeight * dpr);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener('resize', resize);
  resize();

  // Perspective helpers (road depth)
  function zToY(z) {
    const H = window.innerHeight;
    const nearY = H * 0.84;   // car line
    const farY  = H * 0.14;   // horizon
    const t = clamp(z / 1300, 0, 1);
    const e = t*t*(3-2*t);
    return nearY + (farY - nearY) * e;
  }
  function zToScale(z) {
    const t = clamp(z / 1300, 0, 1);
    return 1.0 - 0.66 * t;
  }

  const state = {
    running: true,
    score: 0,
    best: 0,
    lastMissPx: null,

    flash: 0,
    shake: 0,
    t: 0,

    // forward speed
    roadSpeed: 440,
    speedRamp: 6,
    baseAccel: 0.75,

    // drift physics
    leanAccBase: 820,     // px/s^2
    leanAccRamp: 16,
    leanAccMax: 1600,
    friction: 4.2,
    maxVx: 880,

    // scoring
    closePx: 18,
    almostPx: 8,

    // spawn + fairness
    graceLeft: 0,
    spawnGrace: 0.65,      // longer so no instant deaths
    warmupTime: 1.6,       // first N seconds = wide straight road
    warmupLeft: 0,

    // input reliability
    tapCooldown: 0.09,     // debounce window
    tapCoolLeft: 0,
  };

  const car = {
    x: 0,
    y: 0,
    r: 12,      // collision radius
    vx: 0,
    driftDir: 1, // +1 right / -1 left
  };

  // Road segments in Z (center + half width)
  let segments = [];

  function trackAtZ(z) {
    for (const s of segments) {
      if (z >= s.zStart && z < s.zEnd) {
        const segT = clamp((z - s.zStart) / (s.zEnd - s.zStart), 0, 1);
        return {
          center: lerp(s.c0, s.c1, segT),
          halfW:  lerp(s.w0, s.w1, segT),
          seg: s
        };
      }
    }
    if (!segments.length) return null;
    const s = segments[0];
    return { center: s.c0, halfW: s.w0, seg: s };
  }

  function seedSegments() {
    const W = window.innerWidth;
    const mid = W * 0.5;

    segments = [];
    let z = -260;

    // ✅ Warmup: straight + wide for first few segments (prevents spawn deaths)
    let center = mid;
    let halfW = 175;

    for (let i=0; i<10; i++) {
      const len = 190 + Math.random()*120;

      let nextCenter = center;
      let nextHalfW = halfW;

      // after warmup distance, start introducing offsets + width variation
      if (z > 500) {
        const maxShift = clamp(170 - state.score * 1.4, 85, 170);
        nextCenter = clamp(center + (Math.random()*2 - 1) * maxShift, W*0.18, W*0.82);
        nextHalfW  = clamp(halfW + (Math.random()*2 - 1) * 20, 95, 190);
      }

      segments.push({ zStart:z, zEnd:z+len, c0:center, c1:nextCenter, w0:halfW, w1:nextHalfW });
      z += len;
      center = nextCenter;
      halfW = nextHalfW;
    }
  }

  function extendSegmentsIfNeeded() {
    const W = window.innerWidth;
    let farEnd = segments.length ? segments[segments.length-1].zEnd : 0;

    while (farEnd < 1900) {
      const last = segments[segments.length-1];
      const len = 180 + Math.random()*140;

      const lastCenter = last ? last.c1 : W*0.5;
      const lastHalfW  = last ? last.w1 : 175;

      const maxShift = clamp(170 - state.score * 1.4, 85, 170);
      const nextCenter = clamp(lastCenter + (Math.random()*2 - 1) * maxShift, W*0.18, W*0.82);
      const nextHalfW  = clamp(lastHalfW + (Math.random()*2 - 1) * 20, 90, 190);

      segments.push({ zStart:farEnd, zEnd:farEnd+len, c0:lastCenter, c1:nextCenter, w0:lastHalfW, w1:nextHalfW });
      farEnd += len;
    }
  }

  function reset() {
    state.running = true;
    state.score = 0;
    state.lastMissPx = null;
    state.flash = 0;
    state.shake = 0;
    state.t = 0;

    state.roadSpeed = 440;
    state.graceLeft = state.spawnGrace;
    state.warmupLeft = state.warmupTime;

    state.tapCoolLeft = 0;

    car.y = window.innerHeight * 0.84;
    car.vx = 0;
    car.driftDir = Math.random() < 0.5 ? -1 : 1;

    seedSegments();
    extendSegmentsIfNeeded();

    // ✅ Place car safely in lane center
    const tr = trackAtZ(0);
    const pad = car.r + 8;
    car.x = clamp(tr.center, tr.center - (tr.halfW - pad), tr.center + (tr.halfW - pad));
  }

  function endRun(missPx) {
    state.running = false;
    state.best = Math.max(state.best, state.score);
    state.lastMissPx = missPx;
    state.flash = 0.28;
    state.shake = 12;
  }

  function awardFlipScore(edgeDist) {
    if (edgeDist <= state.almostPx) {
      state.score += 3; state.flash = 0.10; state.shake = 7;
    } else if (edgeDist <= state.closePx) {
      state.score += 2; state.flash = Math.max(state.flash, 0.05);
    } else {
      state.score += 1;
    }
  }

  // ✅ Robust action: debounce + ignore multi-touch double fires
  function action() {
    if (!state.running) { reset(); return; }
    if (state.tapCoolLeft > 0) return;

    state.tapCoolLeft = state.tapCooldown;

    // Flip drift direction reliably
    car.driftDir *= -1;

    // Score based on closeness to edge when flipping
    const tr = trackAtZ(0);
    if (tr) {
      const edgeDist = tr.halfW - Math.abs(car.x - tr.center) - car.r;
      awardFlipScore(edgeDist);
    }
  }

  window.addEventListener('pointerdown', (e)=>{
    if (e.isPrimary === false) return; // ignore secondary touch
    e.preventDefault();
    action();
  }, { passive:false });

  window.addEventListener('pointercancel', ()=>{/* no-op but prevents stuck gestures */});
  window.addEventListener('keydown', (e)=>{
    if (e.code === 'Space' || e.code === 'Enter') { e.preventDefault(); action(); }
  });

  let lastT = performance.now();
  function tick(t) {
    const dt = Math.min(0.033, (t-lastT)/1000);
    lastT = t;
    update(dt);
    render();
    requestAnimationFrame(tick);
  }

  function update(dt) {
    state.t += dt;
    state.flash = Math.max(0, state.flash - dt);
    state.shake = Math.max(0, state.shake - dt*30);
    state.tapCoolLeft = Math.max(0, state.tapCoolLeft - dt);

    if (!state.running) return;

    // Warmup countdown
    state.warmupLeft = Math.max(0, state.warmupLeft - dt);

    // move road toward car
    const dz = state.roadSpeed * dt;
    for (const s of segments) { s.zStart -= dz; s.zEnd -= dz; }
    while (segments.length && segments[0].zEnd < -320) segments.shift();
    extendSegmentsIfNeeded();

    // drift accel
    const leanAcc = clamp(state.leanAccBase + state.score * state.leanAccRamp, state.leanAccBase, state.leanAccMax);

    // apply drift
    car.vx += car.driftDir * leanAcc * dt;

    // damping/cap
    car.vx *= Math.exp(-state.friction * dt);
    car.vx = clamp(car.vx, -state.maxVx, state.maxVx);

    // integrate
    car.x += car.vx * dt;

    const tr = trackAtZ(0);
    if (!tr) return;

    // Lane bounds with padding
    const pad = car.r + 4;
    const left  = tr.center - tr.halfW + pad;
    const right = tr.center + tr.halfW - pad;

    // ✅ Always clamp during grace to prevent instant death
    if (state.graceLeft > 0) {
      state.graceLeft = Math.max(0, state.graceLeft - dt);
      car.x = clamp(car.x, left, right);
    }

    // Death check
    const edgeDist = tr.halfW - Math.abs(car.x - tr.center) - car.r;
    if (edgeDist < 0) {
      endRun(Math.abs(edgeDist));
      return;
    }

    // speed ramp baseline
    state.roadSpeed += state.baseAccel * dt;

    // pass events: when segment ends cross below 0
    for (const s of segments) {
      if (!s.passed && s.zEnd < 0) {
        s.passed = true;
        state.roadSpeed += state.speedRamp;

        // light spice later, not during warmup
        if (state.warmupLeft <= 0 && Math.random() < 0.10) car.driftDir *= -1;
      }
    }
  }

  function render() {
    const W = window.innerWidth, H = window.innerHeight;

    let sx=0, sy=0;
    if (state.shake > 0) {
      sx = (Math.random()-0.5)*state.shake;
      sy = (Math.random()-0.5)*state.shake;
    }

    ctx.save();
    ctx.translate(sx, sy);

    // background
    ctx.fillStyle = '#0b0b10';
    ctx.fillRect(-50,-50,W+100,H+100);

    // road ribbon points
    const samples = 36;
    const zFar = 1300;
    const zNear = -60;

    let leftPts = [];
    let rightPts = [];
    for (let i=0; i<=samples; i++) {
      const tz = zFar + (zNear - zFar) * (i / samples);
      const tr = trackAtZ(tz);
      if (!tr) continue;

      const y = zToY(tz);
      const sc = zToScale(tz);

      leftPts.push({ x: tr.center - tr.halfW * sc, y });
      rightPts.push({ x: tr.center + tr.halfW * sc, y });
    }

    // road fill
    ctx.beginPath();
    for (let i=0; i<leftPts.length; i++) {
      const p = leftPts[i];
      if (i===0) ctx.moveTo(p.x, p.y); else ctx.lineTo(p.x, p.y);
    }
    for (let i=rightPts.length-1; i>=0; i--) {
      const p = rightPts[i];
      ctx.lineTo(p.x, p.y);
    }
    ctx.closePath();
    ctx.fillStyle = '#141421';
    ctx.fill();

    // lane edges
    ctx.globalAlpha = 0.75;
    ctx.strokeStyle = '#4ad7ff';
    ctx.lineWidth = 2;

    ctx.beginPath();
    for (let i=0; i<leftPts.length; i++) {
      const p = leftPts[i];
      if (i===0) ctx.moveTo(p.x, p.y); else ctx.lineTo(p.x, p.y);
    }
    ctx.stroke();

    ctx.beginPath();
    for (let i=0; i<rightPts.length; i++) {
      const p = rightPts[i];
      if (i===0) ctx.moveTo(p.x, p.y); else ctx.lineTo(p.x, p.y);
    }
    ctx.stroke();
    ctx.globalAlpha = 1;

    // center dashes (visual speed)
    ctx.globalAlpha = 0.35;
    ctx.strokeStyle = '#ffffff';
    ctx.lineWidth = 2;
    for (let i=0; i<10; i++) {
      const y = (H*0.20) + i*70 + ((state.t*state.roadSpeed*0.25) % 70);
      ctx.beginPath();
      ctx.moveTo(W*0.5, y);
      ctx.lineTo(W*0.5, y+24);
      ctx.stroke();
    }
    ctx.globalAlpha = 1;

    // car shadow
    ctx.globalAlpha = 0.28;
    ctx.fillStyle = '#000';
    ctx.beginPath();
    ctx.ellipse(car.x, car.y + 16, 22, 9, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.globalAlpha = 1;

    // car body (simple)
    ctx.save();
    ctx.translate(car.x, car.y);
    const tilt = clamp(car.vx / 900, -0.35, 0.35);
    ctx.rotate(tilt);
    ctx.fillStyle = '#f2f2f5';
    ctx.fillRect(-16, -10, 32, 20);
    ctx.fillStyle = '#0b0b10';
    ctx.fillRect(-6, -7, 12, 6); // windshield
    ctx.restore();

    // drift arrow indicator
    ctx.globalAlpha = 0.85;
    ctx.fillStyle = '#ffd54a';
    ctx.font = '900 22px system-ui, -apple-system, Segoe UI, Roboto, Arial';
    ctx.fillText(car.driftDir > 0 ? '→' : '←', 18, 82);
    ctx.globalAlpha = 1;

    // HUD
    ctx.fillStyle = '#f2f2f5';
    ctx.font = '900 22px system-ui, -apple-system, Segoe UI, Roboto, Arial';
    ctx.fillText(`Score: ${state.score}`, 18, 34);

    ctx.globalAlpha = 0.75;
    ctx.font = '800 16px system-ui, -apple-system, Segoe UI, Roboto, Arial';
    ctx.fillText(`Best: ${state.best}`, 18, 56);
    ctx.globalAlpha = 1;

    if (state.running) {
      ctx.globalAlpha = 0.75;
      ctx.font = '800 16px system-ui, -apple-system, Segoe UI, Roboto, Arial';
      ctx.fillText('Tap = flip drift. Flip closer to edge = more points.', 18, H - 20);
      ctx.globalAlpha = 1;
    } else {
      ctx.globalAlpha = 0.95;
      ctx.font = '900 54px system-ui, -apple-system, Segoe UI, Roboto, Arial';
      ctx.fillText('ALMOST: DRIFT', 18, H * 0.35);

      ctx.globalAlpha = 0.85;
      ctx.font = '900 26px system-ui, -apple-system, Segoe UI, Roboto, Arial';
      const miss = (state.lastMissPx == null) ? '' : `Missed by ${Math.max(0, state.lastMissPx).toFixed(1)} px`;
      ctx.fillText(miss, 18, H * 0.35 + 46);

      ctx.globalAlpha = 0.85;
      ctx.font = '900 18px system-ui, -apple-system, Segoe UI, Roboto, Arial';
      ctx.fillText('Tap to retry', 18, H * 0.35 + 80);
      ctx.globalAlpha = 1;
    }

    if (state.flash > 0) {
      ctx.globalAlpha = clamp(state.flash * 3.5, 0, 0.32);
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(-50,-50,W+100,H+100);
      ctx.globalAlpha = 1;
    }

    ctx.restore();
  }

  reset();
  requestAnimationFrame(tick);
})();
</script>
</body>
</html>
