<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>ALMOST: MISSTEP — v0.3 (Flip Lean)</title>
  <style>
    html, body { margin:0; padding:0; background:#0b0b10; height:100%; overflow:hidden; }
    canvas { display:block; width:100vw; height:100vh; touch-action:manipulation; }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<script>
(() => {
  const canvas = document.getElementById('c');
  let ctx = canvas.getContext('2d', { alpha:false }) || canvas.getContext('2d');
  if (!ctx) { document.body.innerHTML = '<div style="color:#fff;padding:16px;font:16px system-ui">Canvas unsupported.</div>'; return; }

  const clamp = (v,a,b)=>Math.max(a,Math.min(b,v));
  const lerp = (a,b,t)=>a+(b-a)*t;

  function resize() {
    const dpr = Math.max(1, Math.min(3, window.devicePixelRatio || 1));
    canvas.width = Math.floor(window.innerWidth * dpr);
    canvas.height = Math.floor(window.innerHeight * dpr);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener('resize', resize);
  resize();

  // --- Perspective helpers ---
  function zToY(z) {
    const H = window.innerHeight;
    const nearY = H * 0.82;
    const farY  = H * 0.12;
    const t = clamp(z / 1200, 0, 1);
    const e = t*t*(3-2*t);
    return nearY + (farY - nearY) * e;
  }
  function zToScale(z) {
    const t = clamp(z / 1200, 0, 1);
    return 1.0 - 0.62 * t;
  }

  const state = {
    running: true,
    score: 0,
    best: 0,
    lastMissPx: null,

    flash: 0,
    shake: 0,
    t: 0,

    // forward motion
    worldSpeed: 420,
    speedRamp: 6,
    baseAccel: 0.75,

    // BALANCE MECHANIC
    // leanAcc is the sideways acceleration applied constantly.
    leanAccBase: 900,     // px/s^2
    leanAccRamp: 18,      // increases with score
    leanAccMax: 1700,

    // damping/cap so it's controllable
    friction: 3.8,
    maxVx: 860,

    // scoring tiers (distance from edge when you flip)
    closePx: 18,
    almostPx: 8,

    // start safety
    spawnGrace: 0.45,
    graceLeft: 0,
  };

  const player = {
    x: 0,
    y: 0,
    r: 12,
    vx: 0,
    leanDir: 1, // +1 right / -1 left
  };

  let segments = [];

  function seedSegments() {
    const W = window.innerWidth;
    let z = -220;
    let center = W * 0.5;
    let halfW = 135;

    segments = [];
    for (let i = 0; i < 12; i++) {
      const len = 180 + Math.random() * 120;

      // early fairness: gentle offsets
      const maxShift = 110;
      const nextCenter = clamp(center + (Math.random()*2 - 1) * maxShift, W*0.22, W*0.78);
      const nextHalfW  = clamp(halfW + (Math.random()*2 - 1) * 16, 78, 175);

      segments.push({ zStart:z, zEnd:z+len, c0:center, c1:nextCenter, w0:halfW, w1:nextHalfW });

      z += len;
      center = nextCenter;
      halfW  = nextHalfW;
    }
  }

  function extendSegmentsIfNeeded() {
    const W = window.innerWidth;
    let farEnd = segments.length ? segments[segments.length - 1].zEnd : 0;

    while (farEnd < 1750) {
      const last = segments[segments.length - 1];
      const len = 170 + Math.random() * 140;

      const lastCenter = last ? last.c1 : W*0.5;
      const lastHalfW  = last ? last.w1 : 135;

      // as score rises, reduce max shift so it stays fair at high speed
      const maxShift = clamp(170 - state.score * 1.4, 85, 170);

      const nextCenter = clamp(lastCenter + (Math.random()*2 - 1) * maxShift, W*0.18, W*0.82);
      const nextHalfW  = clamp(lastHalfW + (Math.random()*2 - 1) * 20, 74, 185);

      segments.push({ zStart:farEnd, zEnd:farEnd+len, c0:lastCenter, c1:nextCenter, w0:lastHalfW, w1:nextHalfW });
      farEnd += len;
    }
  }

  function trackAtZ(z) {
    for (const s of segments) {
      if (z >= s.zStart && z < s.zEnd) {
        const segT = clamp((z - s.zStart) / (s.zEnd - s.zStart), 0, 1);
        return { center: lerp(s.c0, s.c1, segT), halfW: lerp(s.w0, s.w1, segT), seg: s };
      }
    }
    if (!segments.length) return null;
    const s = segments[0];
    return { center: s.c0, halfW: s.w0, seg: s };
  }

  function reset() {
    state.running = true;
    state.score = 0;
    state.lastMissPx = null;
    state.flash = 0;
    state.shake = 0;
    state.t = 0;

    state.worldSpeed = 420;
    state.graceLeft = state.spawnGrace;

    player.y = window.innerHeight * 0.82;
    player.vx = 0;
    player.leanDir = Math.random() < 0.5 ? -1 : 1;

    seedSegments();
    extendSegmentsIfNeeded();

    // snap onto track center so you never spawn dead
    const tr = trackAtZ(0);
    const pad = player.r + 6;
    player.x = clamp(tr.center, tr.center - (tr.halfW - pad), tr.center + (tr.halfW - pad));
  }

  function endRun(missPx) {
    state.running = false;
    state.best = Math.max(state.best, state.score);
    state.lastMissPx = missPx;
    state.flash = 0.28;
    state.shake = 12;
  }

  function awardFlipScore(edgeDist) {
    // smaller edgeDist = closer to falling = more points
    if (edgeDist <= state.almostPx) {
      state.score += 3; state.flash = 0.10; state.shake = 7;
    } else if (edgeDist <= state.closePx) {
      state.score += 2; state.flash = Math.max(state.flash, 0.05);
    } else {
      state.score += 1;
    }
  }

  function action() {
    if (!state.running) { reset(); return; }

    // Flip lean direction (THIS gives you agency)
    player.leanDir *= -1;

    // score based on how close you were to the edge when you flipped
    const tr = trackAtZ(0);
    if (tr) {
      const edgeDist = tr.halfW - Math.abs(player.x - tr.center) - player.r;
      awardFlipScore(edgeDist);
    }
  }

  window.addEventListener('pointerdown', (e)=>{ e.preventDefault(); action(); }, {passive:false});
  window.addEventListener('keydown', (e)=>{
    if (e.code === 'Space' || e.code === 'Enter') { e.preventDefault(); action(); }
  });

  let lastT = performance.now();
  function tick(t) {
    const dt = Math.min(0.033, (t-lastT)/1000);
    lastT = t;

    update(dt);
    render();

    requestAnimationFrame(tick);
  }

  function update(dt) {
    state.t += dt;
    state.flash = Math.max(0, state.flash - dt);
    state.shake = Math.max(0, state.shake - dt*30);
    if (!state.running) return;

    // move world toward player
    const dz = state.worldSpeed * dt;
    for (const s of segments) { s.zStart -= dz; s.zEnd -= dz; }
    while (segments.length && segments[0].zEnd < -280) segments.shift();
    extendSegmentsIfNeeded();

    // compute current lean acceleration
    const leanAcc = clamp(state.leanAccBase + state.score * state.leanAccRamp, state.leanAccBase, state.leanAccMax);

    // apply constant lean acceleration
    player.vx += player.leanDir * leanAcc * dt;

    // damping & cap
    player.vx *= Math.exp(-state.friction * dt);
    player.vx = clamp(player.vx, -state.maxVx, state.maxVx);

    // integrate
    player.x += player.vx * dt;

    // track at player
    const tr = trackAtZ(0);
    if (!tr) return;

    const pad = player.r + 2;
    const left  = tr.center - tr.halfW + pad;
    const right = tr.center + tr.halfW - pad;

    // grace: clamp in-bounds briefly so first second feels fair
    if (state.graceLeft > 0) {
      state.graceLeft = Math.max(0, state.graceLeft - dt);
      player.x = clamp(player.x, left, right);
    }

    // death check
    const edgeDist = tr.halfW - Math.abs(player.x - tr.center) - player.r;
    if (edgeDist < 0) {
      endRun(Math.abs(edgeDist));
      return;
    }

    // ramps
    state.worldSpeed += state.baseAccel * dt;

    // segment pass events: when segment ends cross below 0
    for (const s of segments) {
      if (!s.passed && s.zEnd < 0) {
        s.passed = true;
        state.worldSpeed += state.speedRamp;

        // occasional auto-flip keeps you honest, but not random chaos
        if (Math.random() < 0.12) player.leanDir *= -1;
      }
    }
  }

  function render() {
    const W = window.innerWidth, H = window.innerHeight;

    let sx=0, sy=0;
    if (state.shake > 0) {
      sx = (Math.random()-0.5)*state.shake;
      sy = (Math.random()-0.5)*state.shake;
    }

    ctx.save();
    ctx.translate(sx, sy);

    ctx.fillStyle = '#0b0b10';
    ctx.fillRect(-50,-50,W+100,H+100);

    // beam ribbon
    const samples = 34;
    const zFar = 1200;
    const zNear = -40;

    let leftPts = [];
    let rightPts = [];
    for (let i=0; i<=samples; i++) {
      const tz = zFar + (zNear - zFar) * (i / samples);
      const tr = trackAtZ(tz);
      if (!tr) continue;

      const y = zToY(tz);
      const sc = zToScale(tz);
      leftPts.push({ x: tr.center - tr.halfW * sc, y });
      rightPts.push({ x: tr.center + tr.halfW * sc, y });
    }

    ctx.beginPath();
    for (let i=0; i<leftPts.length; i++) {
      const p = leftPts[i];
      if (i===0) ctx.moveTo(p.x, p.y); else ctx.lineTo(p.x, p.y);
    }
    for (let i=rightPts.length-1; i>=0; i--) {
      const p = rightPts[i];
      ctx.lineTo(p.x, p.y);
    }
    ctx.closePath();
    ctx.fillStyle = '#141421';
    ctx.fill();

    // glow edges
    ctx.globalAlpha = 0.6;
    ctx.strokeStyle = '#4ad7ff';
    ctx.lineWidth = 2;

    ctx.beginPath();
    for (let i=0; i<leftPts.length; i++) {
      const p = leftPts[i];
      if (i===0) ctx.moveTo(p.x, p.y); else ctx.lineTo(p.x, p.y);
    }
    ctx.stroke();

    ctx.beginPath();
    for (let i=0; i<rightPts.length; i++) {
      const p = rightPts[i];
      if (i===0) ctx.moveTo(p.x, p.y); else ctx.lineTo(p.x, p.y);
    }
    ctx.stroke();
    ctx.globalAlpha = 1;

    // player shadow + player
    ctx.globalAlpha = 0.25;
    ctx.fillStyle = '#000';
    ctx.beginPath();
    ctx.ellipse(player.x, player.y + 14, 18, 8, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.globalAlpha = 1;

    ctx.fillStyle = '#f2f2f5';
    ctx.beginPath();
    ctx.arc(player.x, player.y, player.r, 0, Math.PI*2);
    ctx.fill();

    // HUD
    ctx.fillStyle = '#f2f2f5';
    ctx.font = '800 22px system-ui, -apple-system, Segoe UI, Roboto, Arial';
    ctx.fillText(`Score: ${state.score}`, 18, 34);

    ctx.globalAlpha = 0.75;
    ctx.font = '700 16px system-ui, -apple-system, Segoe UI, Roboto, Arial';
    ctx.fillText(`Best: ${state.best}`, 18, 56);

    // show lean dir
    ctx.fillText(`Lean: ${player.leanDir > 0 ? '→' : '←'}`, 18, 78);
    ctx.globalAlpha = 1;

    if (state.running) {
      ctx.globalAlpha = 0.75;
      ctx.font = '700 16px system-ui, -apple-system, Segoe UI, Roboto, Arial';
      ctx.fillText('Tap = flip lean direction. Flip closer to edge = more points.', 18, H - 20);
      ctx.globalAlpha = 1;
    } else {
      ctx.globalAlpha = 0.95;
      ctx.font = '900 52px system-ui, -apple-system, Segoe UI, Roboto, Arial';
      ctx.fillText('MISSTEP', 18, H * 0.35);

      ctx.globalAlpha = 0.85;
      ctx.font = '800 26px system-ui, -apple-system, Segoe UI, Roboto, Arial';
      const miss = (state.lastMissPx == null) ? '' : `Missed by ${Math.max(0, state.lastMissPx).toFixed(1)} px`;
      ctx.fillText(miss, 18, H * 0.35 + 44);

      ctx.globalAlpha = 0.85;
      ctx.font = '800 18px system-ui, -apple-system, Segoe UI, Roboto, Arial';
      ctx.fillText('Tap to retry', 18, H * 0.35 + 76);
      ctx.globalAlpha = 1;
    }

    if (state.flash > 0) {
      ctx.globalAlpha = clamp(state.flash * 3.5, 0, 0.32);
      ctx.fillStyle = '#ffffff';
      ctx.fillRect(-50,-50,W+100,H+100);
      ctx.globalAlpha = 1;
    }

    ctx.restore();
  }

  reset();
  requestAnimationFrame(tick);
})();
</script>
</body>
</html>
